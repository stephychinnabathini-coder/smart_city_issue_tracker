<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Smart City Issue Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f4f6fb;font-family:'Segoe UI',sans-serif;}
    .navbar{background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);}
    .navbar a,.navbar .navbar-brand{color:#fff!important;}
    .hero{background:linear-gradient(120deg,#2c5364,#00b4db);color:#fff;
      padding:60px 20px;border-radius:0 0 30px 30px;}
    .card{border:none;border-radius:16px;box-shadow:0 6px 18px rgba(0,0,0,.08);transition:.3s;}
    .card:hover{transform:translateY(-5px);}
    .badge-reported{background:#ffb703;} .badge-in_progress{background:#0096c7;}
    .badge-resolved{background:#2a9d8f;}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg px-4">
  <a class="navbar-brand fw-bold" href="{% url 'home' %}">🏙️ SmartCity</a>
  <div class="ms-auto">
    <a href="{% url 'map' %}" class="me-3">Map</a>
    {% if user.is_authenticated %}
      <a href="{% url 'dashboard' %}" class="me-3">Dashboard</a>
      <a href="{% url 'report' %}" class="me-3">Report</a>
      {% if user.is_authenticated %}
        <form action="{% url 'logout' %}" method="post" class="d-inline">
          {% csrf_token %}
          <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
        </form>
      {% endif %}

    {% else %}
      <a href="{% url 'login' %}" class="me-3">Login</a>
      <a href="{% url 'signup' %}">Sign Up</a>
    {% endif %}
  </div>
</nav>
<div class="container my-4">
  {% for m in messages %}<div class="alert alert-success">{{ m }}</div>{% endfor %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
