<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body>
    {% extends 'base.html' %}{% load widget_tweaks %}
{% block content %}
<div class="card p-4 mx-auto" style="max-width:420px">
  <h3 class="mb-3">Signup</h3>   {# change to "Sign Up" in signup.html #}
  <form method="post">{% csrf_token %}
    {% for f in form %}<div class="mb-3"><label class="form-label">{{ f.label }}</label>{{ f|add_class:"form-control" }}</div>{% endfor %}
    <button class="btn btn-primary w-100">Continue</button>
  </form>
</div>
{% endblock %}

</body>
</html>
